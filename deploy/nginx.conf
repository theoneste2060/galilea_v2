# ─────────────────────────────────────────────────────────────────────────────
# Galilea Global Logistics — nginx + PHP-FPM server block
#
# Flat layout: the repository root IS the web root. The public front controller
# (index.php) and the admin front controller (admin.php) live in the root;
# clean URLs are routed to index.php. The app/, data/ and deploy/ directories
# live inside the root but are denied from the web.
#
# Adjust before use:
#   • server_name            → your domain
#   • root                   → absolute path to this repository
#   • fastcgi_pass           → your PHP-FPM socket / version
#   • (optional) TLS         → see the HTTPS notes at the bottom
#
# Install (Debian/Ubuntu layout):
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/galilea
#   sudo ln -s /etc/nginx/sites-available/galilea /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# NOTE on headers: nginx does NOT merge `add_header` from the server block into
# a location that defines its own `add_header`. This config therefore sets the
# security headers once at the server level and uses only `expires` (no
# `add_header`) inside locations, so every response keeps the security headers.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen      80;
    listen      [::]:80;
    server_name galilea.example.com;          # ← your domain

    root  /var/www/galilea_v2;                # ← absolute path to this repo
    index index.php;

    # Allow image uploads (matches the app's size cap, with headroom).
    client_max_body_size 8m;

    # Baseline security headers for ALL responses (including static assets).
    # PHP/HTML responses additionally set CSP + HSTS from the application.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options       "DENY"     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # 1) Never serve application code, the database, or deploy files.
    location ~ ^/(app|data|deploy|tests|tools)(/|$) { return 403; }

    # 2) Never serve dotfiles (.htaccess, .git, .env, …) — but keep
    #    /.well-known/ reachable (the app publishes security.txt there).
    location ~ /\.(?!well-known) { return 403; }

    # 3) Uploaded files: serve as static, never execute as PHP.
    location ^~ /uploads/ {
        location ~ \.php$ { return 403; }
        expires 30d;
        try_files $uri =404;
    }

    # 4) Long-cache the content-versioned static assets.
    location ~* \.(?:css|js|jpe?g|png|gif|webp|svg|ico|woff2?)$ {
        expires 30d;
        access_log off;
        try_files $uri =404;
    }

    # 5) Clean-URL routing → public front controller.
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # 6) PHP execution: index.php (public site + JSON API) and admin.php.
    #    Only existing .php files in the root run; everything else was routed
    #    to index.php above.
    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        # Behind a TLS terminator (or in the HTTPS block below) add:
        #   fastcgi_param HTTPS on;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;   # ← match your PHP-FPM
        fastcgi_read_timeout 60s;
    }
}

# ── Enabling HTTPS (recommended) ─────────────────────────────────────────────
# Easiest: install certbot and run `sudo certbot --nginx` — it provisions a
# Let's Encrypt certificate and rewrites the block above to listen on 443.
#
# Manual: change the server above to
#     listen 443 ssl;
#     http2  on;
#     ssl_certificate     /etc/letsencrypt/live/DOMAIN/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/DOMAIN/privkey.pem;
#     ssl_protocols TLSv1.2 TLSv1.3;
# add `fastcgi_param HTTPS on;` inside the `location ~ \.php$` block (so the app
# sets Secure cookies + HSTS), and add a redirect server for plain HTTP:
#     server { listen 80; server_name DOMAIN; return 301 https://$host$request_uri; }
